name: iOS Release (TestFlight)

on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta

concurrency:
  group: mobile-ios-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios/App

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Prepare App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          RAW_KEY_PATH="$RUNNER_TEMP/AuthKey_raw.p8"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$ASC_KEY_CONTENT" > "$RAW_KEY_PATH"

          echo "Secret as given: $(wc -c < "$RAW_KEY_PATH") bytes, $(wc -l < "$RAW_KEY_PATH") lines"

          # Secret may be just the base64 body without the PEM armor lines — re-wrap it.
          if ! grep -q "BEGIN" "$RAW_KEY_PATH"; then
            echo "No PEM header found — wrapping as PKCS8 PEM"
            BODY="$(cat "$RAW_KEY_PATH")"
            { echo "-----BEGIN PRIVATE KEY-----"; printf '%s\n' "$BODY"; echo "-----END PRIVATE KEY-----"; } > "$RAW_KEY_PATH.pem"
            mv "$RAW_KEY_PATH.pem" "$RAW_KEY_PATH"
          fi

          # altool requires the original PKCS8 "PRIVATE KEY" format —
          # do not re-encode as SEC1 "EC PRIVATE KEY" here.
          mv "$RAW_KEY_PATH" "$KEY_PATH"
          echo "ASC_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        working-directory: ios/App
        run: bundle exec fastlane ${{ github.event.inputs.lane }}

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
