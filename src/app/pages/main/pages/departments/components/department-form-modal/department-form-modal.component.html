<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ (isEditMode ? 'DEPT_EDIT_TITLE' : 'DEPT_NEW_TITLE') | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="solid" color="primary" [disabled]="isSubmitting || form.invalid" (click)="submit()">
        @if (isSubmitting) {
          <ion-spinner name="crescent" slot="start" style="width:16px;height:16px"></ion-spinner>
        }
        {{ (isEditMode ? 'SAVE' : 'CREATE') | translate }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="submit()">

    <ion-list lines="none">

      <ion-item class="form-item" [class.ion-invalid]="form.controls.name.invalid && form.controls.name.touched">
        <ion-input
          [label]="'DEPT_NAME_LABEL' | translate"
          labelPlacement="floating"
          [placeholder]="'DEPT_NAME_PLACEHOLDER' | translate"
          formControlName="name"
          [clearInput]="true"
        ></ion-input>
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <ion-note slot="error">{{ 'DEPT_NAME_REQUIRED' | translate }}</ion-note>
        }
      </ion-item>

      <ion-item class="form-item">
        <ion-input
          [label]="'PHONE' | translate"
          labelPlacement="floating"
          placeholder="+1 (555) 000-0000"
          formControlName="phone"
          type="tel"
          [clearInput]="true"
        ></ion-input>
      </ion-item>

      <ion-item class="form-item">
        <ion-input
          [label]="'ADDRESS' | translate"
          labelPlacement="floating"
          [placeholder]="'DEPT_ADDRESS_PLACEHOLDER' | translate"
          formControlName="formattedAddress"
          [clearInput]="true"
        ></ion-input>
      </ion-item>

      <ion-item class="form-item">
        <ion-input
          [label]="'WEBSITE_URL' | translate"
          labelPlacement="floating"
          [placeholder]="'DEPT_WEBSITE_PLACEHOLDER' | translate"
          formControlName="websiteURL"
          type="url"
          [clearInput]="true"
        ></ion-input>
      </ion-item>

    </ion-list>

  </form>
</ion-content>
